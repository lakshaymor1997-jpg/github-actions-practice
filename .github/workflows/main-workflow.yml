name: Main Workflow

on:
  workflow_dispatch:

jobs:

  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate
        run: |
          echo "Validating..."
          echo "Branch: ${{ github.ref_name }}"

  deploy-dev:
    needs: validate
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment: 'dev'
      appName: 'myapp'
    secrets:
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}

  deploy-staging:
    needs: deploy-dev
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment: 'staging'
      appName: 'myapp'
    secrets:
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}

  deploy-production:
    needs: deploy-staging
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment: 'production'
      appName: 'myapp'
    secrets:
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}

  notify:
    needs: [deploy-dev, deploy-staging, deploy-production]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "Deployed to all 3 environments!"
          echo "App: myapp"
          echo "Run: ${{ github.run_number }}"
