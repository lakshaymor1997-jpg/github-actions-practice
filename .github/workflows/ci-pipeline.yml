name: ci pipeline
on: 
  workflow_dispatch: 

env:
  APP_NAME: 'Zomato'
  ENVIRONMENT: 'dev'

jobs:

  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Print info
        run: |
          echo "Pipeline started!"
          echo "Branch: ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Repo: ${{ github.repository }}"

  lint:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: hardcoded variables
        run: |
          echo "App: ${{ env.APP_NAME }}"
          echo "Environment: ${{ env.ENVIRONMENT }}"
   
  build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: run number and sha
        run: |
          echo "Run number: ${{ github.run_number }}"
          echo "Commit SHA: ${{ github.sha }}"  

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Secret
        run: |
          echo "Secret value: ${{ secrets.MY_SECRET }}"
          echo "Notice it will show *** in logs!"
        env:
          MY_SECRET: ${{ secrets.MY_SECRET }}

  notify:
    needs:
      - build
      - deploy
      - lint
      - validate
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "=============================="
          echo "App: ${{ env.APP_NAME }}"
          echo "Environment: ${{ env.ENVIRONMENT }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Run: ${{ github.run_number }}"
          echo "=============================="
    
